              { name:"UK Financial Year End — 5 April", date:"Sun 5 Apr 2026", startDate:"2026-04-05", tier:"financial", isCritical:false, action:"Ensure all accounting integrations for UK clients are clean going into year-end." },
              { name:"Good Friday", date:"Fri 3 Apr 2026", startDate:"2026-04-03", tier:"high", isCritical:false, action:"Confirm all client integration pipelines are healthy entering Easter weekend. No deployments." },
