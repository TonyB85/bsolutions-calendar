              { name:"Black Friday", date:"Fri 27 Nov 2026", startDate:"2026-11-27", tier:"critical", isCritical:true, action:"All integrations must be tested and stable before 10 Nov. All team members on support readiness from 26 Nov." },
              { name:"Cyber Monday", date:"Mon 30 Nov 2026", startDate:"2026-11-30", tier:"critical", isCritical:true, action:"Maintain all BFCM monitoring and support readiness through Monday." },
              { name:"Post-BFCM integration health check", date:"~1–5 Dec 2026", startDate:"2026-12-01", tier:"platform", isCritical:false, action:"Run a systematic health check of all client integrations 1–5 Dec." },
              { name:"12.12 — SEA Mega Sale", date:"Sat 12 Dec 2026", startDate:"2026-12-12", tier:"standard", isCritical:false, action:"Monitor Shopee/Lazada integration health for relevant clients." },
              { name:"Christmas shipping cutoffs", date:"~15–22 Dec 2026", startDate:"2026-12-15", tier:"critical", isCritical:true, action:"Ensure all WMS/3PL integrations are processing orders without delay from 15 Dec. No changes 15–24 Dec." },
              { name:"Boxing Day sales (UK/AU/CA/NZ)", date:"Sat 26 Dec 2026", startDate:"2026-12-26", tier:"high", isCritical:false, action:"Ensure order and inventory integrations are healthy for Boxing Day." },
              { name:"UK VAT Q4 return due", date:"7 Feb 2027", startDate:"2027-02-07", tier:"financial", isCritical:false, action:"Ensure UK client accounting integrations are clean after peak season." },
            ];

            const TIER_LABELS = {
              critical: "🔴 Critical",
              high: "🟡 High",
              standard: "🟢 Standard",
              platform: "🔵 Platform / Integration",
              financial: "🟣 Financial / Compliance"
            };

            const TIER_COLORS = {
              critical: { bg:'#FFF0EC', border:'#FC664A' },
              high:     { bg:'#FEFBF0', border:'#F7D08A' },
              standard: { bg:'#E8F8F8', border:'#00A9A5' },
              platform: { bg:'#F2F2FC', border:'#7070D0' },
              financial:{ bg:'#EEFAF4', border:'#40B080' },
            };

            const today = new Date();
            today.setHours(0,0,0,0);

            function daysUntil(dateStr) {
              const d = new Date(dateStr);
              d.setHours(0,0,0,0);
              return Math.round((d - today) / (1000 * 60 * 60 * 24));
            }

            // All events in next 90 days, sorted by date
            const upcoming = EVENTS
              .map(ev => ({ ...ev, days: daysUntil(ev.startDate) }))
              .filter(ev => ev.days >= 0 && ev.days <= 90)
              .sort((a, b) => a.days - b.days);

            if (upcoming.length === 0) {
              console.log('No events in the next 90 days. No weekly digest sent.');
              return;
            }

            const todayStr = today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
            const criticalCount = upcoming.filter(e => e.tier === 'critical' || e.isCritical).length;

            let htmlBody = `<!DOCTYPE html><html><head><meta charset="UTF-8">
            <style>
              body{font-family:Arial,sans-serif;background:#F4F4F7;margin:0;padding:20px}
              .container{max-width:640px;margin:0 auto}
              .header{background:#26284A;color:#fff;padding:20px 24px;border-radius:10px 10px 0 0}
              .header h1{font-size:18px;font-weight:600;margin:0}
              .header p{font-size:12px;color:rgba(255,255,255,0.6);margin:4px 0 0}
              .body{background:#fff;padding:20px 24px;border-radius:0 0 10px 10px;border:1px solid #E0E0EA;border-top:none}
              .summary-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:#F8F8FC;border-radius:8px;border:1px solid #E8E8F4}
              .summary-item{font-size:11px;color:#4A4A6A;padding:3px 8px;border-radius:20px;background:#fff;border:1px solid #E0E0EA}
              .event-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;margin-bottom:8px;border-radius:8px;border-left:4px solid transparent}
              .event-days{font-size:18px;font-weight:700;min-width:32px;text-align:right;flex-shrink:0;line-height:1.2}
              .event-days-label{font-size:9px;font-weight:500;color:#8888AA;text-transform:uppercase;text-align:right}
              .event-days-wrap{flex-shrink:0;min-width:44px}
              .event-info{flex:1}
              .event-name{font-size:13px;font-weight:600;color:#26284A;line-height:1.3}
              .event-date{font-size:11px;color:#8888AA;margin-top:2px}
              .event-tier{font-size:10px;color:#6666AA;margin-top:2px}
              .footer{text-align:center;font-size:11px;color:#AAAACC;padding:16px 0 0}
              .footer a{color:#2E4E79;text-decoration:none}
              .section-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#AAAACC;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid #F0F0F8}
            </style></head><body>
            <div class="container">
              <div class="header">
                <h1>b.solutions — Weekly 90-Day Digest</h1>
                <p>${todayStr} &nbsp;·&nbsp; ${upcoming.length} events in the next 90 days &nbsp;·&nbsp; ${criticalCount} critical</p>
              </div>
              <div class="body">
                <div class="summary-bar">
                  <span class="summary-item">🔴 Critical: ${upcoming.filter(e=>e.tier==='critical').length}</span>
                  <span class="summary-item">🟡 High: ${upcoming.filter(e=>e.tier==='high').length}</span>
                  <span class="summary-item">🔵 Platform: ${upcoming.filter(e=>e.tier==='platform').length}</span>
                  <span class="summary-item">🟣 Financial: ${upcoming.filter(e=>e.tier==='financial').length}</span>
                  <span class="summary-item">🟢 Standard: ${upcoming.filter(e=>e.tier==='standard').length}</span>
                </div>`;

            // Group by month
            const byMonth = {};
            upcoming.forEach(ev => {
              const d = new Date(ev.startDate);
              const key = d.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
              if (!byMonth[key]) byMonth[key] = [];
              byMonth[key].push(ev);
            });

            Object.entries(byMonth).forEach(([month, events]) => {
              htmlBody += `<div class="section-header">${month}</div>`;
              events.forEach(ev => {
                const colors = TIER_COLORS[ev.tier];
                const daysLabel = ev.days === 0 ? 'Today' : ev.days === 1 ? '1 day' : `${ev.days} days`;
                const daysColor = ev.days <= 7 ? '#FC664A' : ev.days <= 14 ? '#C07000' : '#26284A';
                htmlBody += `<div class="event-row" style="background:${colors.bg};border-left-color:${colors.border}">
                  <div class="event-days-wrap">
                    <div class="event-days" style="color:${daysColor}">${ev.days}</div>
                    <div class="event-days-label">days</div>
                  </div>
                  <div class="event-info">
                    <div class="event-name">${ev.isCritical ? '★ ' : ''}${ev.name}</div>
                    <div class="event-date">📆 ${ev.date}</div>
                    <div class="event-tier">${TIER_LABELS[ev.tier]}</div>
                  </div>
                </div>`;
              });
            });

            htmlBody += `<div class="footer"><p>b.solutions internal calendar &nbsp;·&nbsp; <a href="https://tonyb85.github.io/bsolutions-calendar/">View full calendar</a></p></div></div></div></body></html>`;

            const transporter = nodemailer.createTransport({ service:'gmail', auth:{ user:process.env.GMAIL_USER, pass:process.env.GMAIL_APP_PASSWORD }});

            await transporter.sendMail({
              from: `"b.solutions Calendar" <${process.env.GMAIL_USER}>`,
              to: process.env.GMAIL_USER,
              subject: `📆 b.solutions Weekly Digest — ${upcoming.length} events in next 90 days${criticalCount > 0 ? ` (${criticalCount} critical)` : ''}`,
              html: htmlBody
            });

            console.log(`✓ Weekly digest sent. ${upcoming.length} events included.`);
